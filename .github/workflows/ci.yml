name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    name: lint, build, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-php@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Lint
        run: composer lint

      - name: Build
        run: 

      - name: Unit tests
        run: npm test
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://nokta:nokta_secret@localhost:5432/nokta_test?schema=public
          JWT_ACCESS_SECRET: ci-access-secret-minimum-32-characters
          JWT_REFRESH_SECRET: ci-refresh-secret-minimum-32-characters
          REDIS_HOST: localhost
          REDIS_PORT: '6379'

      - name: E2E tests
        run: php artisan test:e2e
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://nokta:nokta_secret@localhost:5432/nokta_test?schema=public
          JWT_ACCESS_SECRET: ci-access-secret-minimum-32-characters
          JWT_REFRESH_SECRET: ci-refresh-secret-minimum-32-characters
          REDIS_HOST: localhost
          REDIS_PORT: '6379'

